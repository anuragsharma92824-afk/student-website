<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <hr>
    <header>
        <div class="header" >
        <h1  > Sign Up</h1>
        <h3 >  Please fill in this form to create an account!</h3>
        
        <!---navigator-->
        
    <nav class="nav">
<a href="index.html"> HOME </a>
<a href="signup.html"> signup </a>
<a href="contact.html"> contact </a>
<a href="login.html"> login </a>
    </nav1>
</div>
    </header>
    <!----signup form-->
    <hr>
    <main class="main">
        
            <form class="form">
                 First Name : 
                <input type="text" size="30" placeholder="type name">
                
                 Last Name :
                <input type="text" size="30"placeholder="type last name">
                
                 Email:
                <input type="email" size="30"placeholder="type email">
                
                 Password:
                <input type="password"size="30" placeholder="type password">
                
                 Re-type Password:
                <input type="text" size="30"placeholder="Re-type password">
                
                 Contact:
                <input type="tel"size="30" placeholder="type contact">
                
                <!---- gender droup down-->
                 Gender:
              <select name="gender">
                
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
              
              <!---submit button-->

              <input type="submit" value="submit form" class="btn-submit" >
              
            
              <div class="signup-line">
              <span>Already have an account?</span> <input type="button" value="login" class="btn-login"
              onclick="window.location.href='login.html'">
              </div>
            
            </form>
            
             </main>
             <hr>
             <footer class="footer">
    <p > @ 2026 Student Learning Website</p>
    </footer>

    
</body>
</html>
